<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoganBrowser 1.0</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0b0f;
            color: #e5e5e5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Title Bar */
        .title-bar {
            background: #111118;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1a1a25;
            user-select: none;
        }
        .title-bar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .browser-logo {
            width: 20px; height: 20px;
            background: linear-gradient(135deg, #7aa2ff, #5a80cc);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900; color: #fff;
        }
        .title-bar-title {
            font-size: 0.8rem;
            color: #8a96b8;
            letter-spacing: 1px;
        }
        .title-bar-buttons {
            display: flex; gap: 8px;
        }
        .title-btn {
            width: 14px; height: 14px; border-radius: 50%; border: none; cursor: pointer;
        }
        .btn-min { background: #ffbd2e; }
        .btn-max { background: #28c840; }
        .btn-close { background: #ff5f57; }

        /* Tab Bar */
        .tab-bar {
            background: #0d0d14;
            display: flex;
            align-items: center;
            padding: 4px 8px 0;
            gap: 2px;
            border-bottom: 1px solid #1a1a25;
        }
        .tab {
            background: #16161f;
            border: 1px solid #1e1e2a;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            padding: 6px 16px;
            font-size: 0.75rem;
            color: #8a96b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 200px;
            position: relative;
            transition: background 0.2s;
        }
        .tab.active {
            background: #1a1a28;
            color: #7aa2ff;
        }
        .tab-close {
            font-size: 0.65rem;
            opacity: 0.5;
            cursor: pointer;
            padding: 2px;
            border-radius: 3px;
        }
        .tab-close:hover { opacity: 1; background: rgba(255,255,255,0.1); }
        .new-tab {
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px;
            font-size: 1rem;
            color: #555;
            cursor: pointer;
            transition: 0.2s;
        }
        .new-tab:hover { background: #1a1a28; color: #7aa2ff; }

        /* URL Bar */
        .url-bar {
            background: #111118;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #1a1a25;
        }
        .nav-buttons {
            display: flex; gap: 4px;
        }
        .nav-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #5a6480;
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .nav-btn:hover { background: #1a1a28; color: #7aa2ff; }
        .url-input-wrap {
            flex: 1;
            background: #0a0a12;
            border: 1px solid #1e1e2a;
            border-radius: 20px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: border-color 0.2s;
        }
        .url-input-wrap:focus-within {
            border-color: #7aa2ff;
            box-shadow: 0 0 10px rgba(122,162,255,0.15);
        }
        .url-lock { color: #3ba55d; font-size: 0.75rem; }
        .url-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #cbd5ff;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .url-input::placeholder { color: #3a4a6a; }

        /* Bookmarks Bar */
        .bookmarks-bar {
            background: #0d0d14;
            padding: 4px 12px;
            display: flex;
            gap: 4px;
            border-bottom: 1px solid #1a1a25;
            overflow-x: auto;
        }
        .bookmark {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.72rem;
            color: #8a96b8;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .bookmark:hover { background: #1a1a28; color: #7aa2ff; }
        .bookmark-icon { font-size: 0.8rem; }

        /* Content Area */
        .browser-content {
            flex: 1;
            position: relative;
            background: #fff;
        }
        .browser-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading-bar {
            position: absolute;
            top: 0; left: 0;
            height: 3px;
            background: linear-gradient(90deg, #7aa2ff, #5a80cc, #7aa2ff);
            background-size: 200% 100%;
            animation: loading-slide 1s linear infinite;
            width: 0;
            transition: width 0.3s;
            z-index: 10;
        }
        .loading-bar.active { width: 70%; }
        .loading-bar.done { width: 100%; transition: width 0.2s; }

        @keyframes loading-slide {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* New Tab Page */
        .new-tab-page {
            width: 100%; height: 100%;
            background: #0b0b0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        .ntp-logo {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #7aa2ff, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }
        .ntp-search {
            width: 500px;
            max-width: 90%;
            background: #111118;
            border: 1px solid #1e1e2a;
            border-radius: 24px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.2s;
        }
        .ntp-search:focus-within { border-color: #7aa2ff; }
        .ntp-search input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #cbd5ff;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .ntp-search input::placeholder { color: #3a4a6a; }
        .ntp-search-icon { color: #5a6480; }
        .ntp-shortcuts {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }
        .ntp-shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 12px;
            border-radius: 12px;
            transition: 0.2s;
            width: 90px;
        }
        .ntp-shortcut:hover { background: #111118; }
        .ntp-shortcut-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }
        .ntp-shortcut-label {
            font-size: 0.7rem;
            color: #8a96b8;
            text-align: center;
        }

        /* Status Bar */
        .status-bar {
            background: #111118;
            padding: 3px 12px;
            font-size: 0.7rem;
            color: #3a4a6a;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #1a1a25;
        }

        /* Back link */
        .back-to-site {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #7aa2ff, #5a80cc);
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(122,162,255,0.3);
            transition: transform 0.2s;
        }
        .back-to-site:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <!-- Title Bar -->
    <div class="title-bar">
        <div class="title-bar-left">
            <div class="browser-logo">L</div>
            <span class="title-bar-title">LoganBrowser 1.0</span>
        </div>
        <div class="title-bar-buttons">
            <button class="title-btn btn-min" title="Minimize"></button>
            <button class="title-btn btn-max" title="Maximize"></button>
            <button class="title-btn btn-close" title="Close" onclick="window.location='index.html'"></button>
        </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar" id="tab-bar">
        <div class="tab active" id="tab-0" data-id="0">
            <span class="tab-title">New Tab</span>
            <span class="tab-close">&times;</span>
        </div>
        <div class="new-tab" id="new-tab-btn" title="New Tab">+</div>
    </div>

    <!-- URL Bar -->
    <div class="url-bar">
        <div class="nav-buttons">
            <button class="nav-btn" id="btn-back" title="Back">&#8592;</button>
            <button class="nav-btn" id="btn-forward" title="Forward">&#8594;</button>
            <button class="nav-btn" id="btn-refresh" title="Refresh">&#8635;</button>
        </div>
        <div class="url-input-wrap">
            <span class="url-lock">&#128274;</span>
            <input type="text" class="url-input" id="url-input" placeholder="Search or enter URL" autocomplete="off">
        </div>
    </div>

    <!-- Bookmarks Bar -->
    <div class="bookmarks-bar">
        <div class="bookmark" data-url="https://en.wikipedia.org"><span class="bookmark-icon">&#128214;</span> Wikipedia</div>
        <div class="bookmark" data-url="https://news.ycombinator.com"><span class="bookmark-icon">&#128293;</span> Hacker News</div>
        <div class="bookmark" data-url="https://reddit.com"><span class="bookmark-icon">&#129412;</span> Reddit</div>
        <div class="bookmark" data-url="https://github.com"><span class="bookmark-icon">&#128025;</span> GitHub</div>
        <div class="bookmark" data-url="https://youtube.com"><span class="bookmark-icon">&#9654;</span> YouTube</div>
        <div class="bookmark" data-url="https://stackoverflow.com"><span class="bookmark-icon">&#128161;</span> Stack Overflow</div>
        <div class="bookmark" data-url="https://logansandivar.com"><span class="bookmark-icon">&#11088;</span> LoganSandivar</div>
    </div>

    <!-- Content -->
    <div class="browser-content" id="browser-content">
        <div class="loading-bar" id="loading-bar"></div>
        <!-- New Tab Page (default) -->
        <div class="new-tab-page" id="ntp">
            <div class="ntp-logo">LoganBrowser</div>
            <div class="ntp-search">
                <span class="ntp-search-icon">&#128269;</span>
                <input type="text" id="ntp-search-input" placeholder="Search the web or enter a URL...">
            </div>
            <div class="ntp-shortcuts">
                <div class="ntp-shortcut" data-url="https://en.wikipedia.org">
                    <div class="ntp-shortcut-icon" style="background:#1a1a28;">&#128214;</div>
                    <div class="ntp-shortcut-label">Wikipedia</div>
                </div>
                <div class="ntp-shortcut" data-url="https://reddit.com">
                    <div class="ntp-shortcut-icon" style="background:#1a1a28;">&#129412;</div>
                    <div class="ntp-shortcut-label">Reddit</div>
                </div>
                <div class="ntp-shortcut" data-url="https://github.com">
                    <div class="ntp-shortcut-icon" style="background:#1a1a28;">&#128025;</div>
                    <div class="ntp-shortcut-label">GitHub</div>
                </div>
                <div class="ntp-shortcut" data-url="https://youtube.com">
                    <div class="ntp-shortcut-icon" style="background:#1a1a28;">&#9654;</div>
                    <div class="ntp-shortcut-label">YouTube</div>
                </div>
                <div class="ntp-shortcut" data-url="https://news.ycombinator.com">
                    <div class="ntp-shortcut-icon" style="background:#1a1a28;">&#128293;</div>
                    <div class="ntp-shortcut-label">Hacker News</div>
                </div>
                <div class="ntp-shortcut" data-url="https://logansandivar.com">
                    <div class="ntp-shortcut-icon" style="background:linear-gradient(135deg,#7aa2ff,#5a80cc);">&#11088;</div>
                    <div class="ntp-shortcut-label">Logan's Site</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <span id="status-text">Ready</span>
        <span>LoganBrowser 1.0 - Powered by vibes</span>
    </div>

    <a href="index.html" class="back-to-site">&#8592; Back to Site</a>

    <script>
        const urlInput = document.getElementById('url-input');
        const ntpInput = document.getElementById('ntp-search-input');
        const content = document.getElementById('browser-content');
        const ntp = document.getElementById('ntp');
        const loadingBar = document.getElementById('loading-bar');
        const statusText = document.getElementById('status-text');
        const tabBar = document.getElementById('tab-bar');

        let tabs = [{ id: 0, title: 'New Tab', url: '', history: [], histIdx: -1 }];
        let activeTab = 0;
        let tabCounter = 1;

        function navigateTo(url) {
            if (!url) return;

            // Add protocol if missing
            if (!/^https?:\/\//i.test(url)) {
                if (url.includes('.') && !url.includes(' ')) {
                    url = 'https://' + url;
                } else {
                    url = 'https://www.google.com/search?igu=1&q=' + encodeURIComponent(url);
                }
            }

            const tab = tabs.find(t => t.id === activeTab);
            if (tab) {
                tab.url = url;
                tab.history = tab.history.slice(0, tab.histIdx + 1);
                tab.history.push(url);
                tab.histIdx = tab.history.length - 1;
            }

            urlInput.value = url;
            statusText.textContent = 'Loading ' + url + '...';
            loadingBar.className = 'loading-bar active';

            // Hide NTP, show iframe
            ntp.style.display = 'none';
            let iframe = content.querySelector('iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups');
                content.appendChild(iframe);
            }

            // Try direct iframe first, fall back to proxy
            iframe.onload = () => {
                loadingBar.className = 'loading-bar done';
                setTimeout(() => { loadingBar.className = 'loading-bar'; }, 300);
                statusText.textContent = url;
                try {
                    const title = iframe.contentDocument?.title || url;
                    updateTabTitle(activeTab, title);
                } catch(e) {
                    updateTabTitle(activeTab, new URL(url).hostname);
                }
            };
            iframe.onerror = () => {
                statusText.textContent = 'Failed to load';
                loadingBar.className = 'loading-bar';
            };

            iframe.src = url;
        }

        function updateTabTitle(tabId, title) {
            const tab = tabs.find(t => t.id === tabId);
            if (tab) tab.title = title;
            const el = document.getElementById('tab-' + tabId);
            if (el) el.querySelector('.tab-title').textContent = title.substring(0, 25);
        }

        function showNewTabPage() {
            ntp.style.display = '';
            const iframe = content.querySelector('iframe');
            if (iframe) iframe.remove();
            urlInput.value = '';
            statusText.textContent = 'Ready';
            updateTabTitle(activeTab, 'New Tab');
        }

        function addNewTab() {
            const id = tabCounter++;
            tabs.push({ id, title: 'New Tab', url: '', history: [], histIdx: -1 });

            // Deactivate current
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

            const tabEl = document.createElement('div');
            tabEl.className = 'tab active';
            tabEl.id = 'tab-' + id;
            tabEl.dataset.id = id;
            tabEl.innerHTML = '<span class="tab-title">New Tab</span><span class="tab-close">&times;</span>';
            tabBar.insertBefore(tabEl, document.getElementById('new-tab-btn'));

            activeTab = id;
            showNewTabPage();
        }

        function switchTab(id) {
            if (id === activeTab) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const el = document.getElementById('tab-' + id);
            if (el) el.classList.add('active');
            activeTab = id;

            const tab = tabs.find(t => t.id === id);
            if (tab && tab.url) {
                navigateTo(tab.url);
            } else {
                showNewTabPage();
            }
        }

        function closeTab(id) {
            if (tabs.length <= 1) {
                window.location = 'index.html';
                return;
            }
            const idx = tabs.findIndex(t => t.id === id);
            tabs.splice(idx, 1);
            document.getElementById('tab-' + id)?.remove();
            if (activeTab === id) {
                const next = tabs[Math.min(idx, tabs.length - 1)];
                switchTab(next.id);
            }
        }

        // Event listeners
        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') navigateTo(urlInput.value.trim());
        });

        ntpInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') navigateTo(ntpInput.value.trim());
        });

        document.getElementById('new-tab-btn').addEventListener('click', addNewTab);

        document.getElementById('btn-back').addEventListener('click', () => {
            const tab = tabs.find(t => t.id === activeTab);
            if (tab && tab.histIdx > 0) {
                tab.histIdx--;
                tab.url = tab.history[tab.histIdx];
                navigateTo(tab.url);
            }
        });

        document.getElementById('btn-forward').addEventListener('click', () => {
            const tab = tabs.find(t => t.id === activeTab);
            if (tab && tab.histIdx < tab.history.length - 1) {
                tab.histIdx++;
                tab.url = tab.history[tab.histIdx];
                navigateTo(tab.url);
            }
        });

        document.getElementById('btn-refresh').addEventListener('click', () => {
            const iframe = content.querySelector('iframe');
            if (iframe) iframe.src = iframe.src;
        });

        // Tab clicks (delegation)
        tabBar.addEventListener('click', (e) => {
            const close = e.target.closest('.tab-close');
            const tab = e.target.closest('.tab');
            if (close && tab) {
                closeTab(Number(tab.dataset.id));
            } else if (tab) {
                switchTab(Number(tab.dataset.id));
            }
        });

        // Bookmark clicks
        document.querySelectorAll('.bookmark, .ntp-shortcut').forEach(el => {
            el.addEventListener('click', () => {
                const url = el.dataset.url;
                if (url) navigateTo(url);
            });
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 't') { e.preventDefault(); addNewTab(); }
            if (e.ctrlKey && e.key === 'w') { e.preventDefault(); closeTab(activeTab); }
            if (e.ctrlKey && e.key === 'l') { e.preventDefault(); urlInput.focus(); urlInput.select(); }
        });
    </script>
</body>
</html>
