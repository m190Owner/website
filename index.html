<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logan Sandivar | Developer</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Open Graph / Discord & Social Embeds -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Logan Sandivar" />
    <meta property="og:description" content="Developer, Creator, ServerLagger" />
    <meta property="og:image" content="https://logansandivar.com/og-image.jpg" />
    <meta property="og:url" content="https://logansandivar.com" />
    <meta name="theme-color" content="#7aa2ff" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Logan Sandivar" />
    <meta name="twitter:description" content="Developer, Creator, ServerLagger" />
    <meta name="twitter:image" content="https://logansandivar.com/og-image.jpg" />

    <style>
        /* Reset & Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0b0f;
            color: #e5e5e5;
            overflow: hidden;
        }

        body.loaded #home {
            opacity: 1;
            transform: translateY(0);
        }

        /* Home Section */
        #home {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s ease, transform 1.2s ease;
        }

        /* Background Video */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -9999;
            filter: brightness(0.1);
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            pointer-events: none;
            background: rgba(122, 162, 255, 0.6);
            box-shadow: 0 0 20px rgba(122, 162, 255, 0.8);
            transform: translate(-50%, -50%);
            z-index: 9999;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        /* Sections */
        section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Home Content */
        .home-content {
            transform: translateY(-200px);
        }

        .home-content h1 {
            font-size: 3.5rem;
            letter-spacing: 3px;
            position: relative;
            display: inline-block;
        }

        /* Glitch effect */
        .glitch {
            position: relative;
            animation: flicker 3s infinite;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
        }

        .glitch::before {
            color: #ff3333;
            z-index: -1;
        }

        .glitch::after {
            color: #3333ff;
            z-index: -1;
        }

        .glitch:hover::before {
            opacity: 0.8;
            animation: glitch-r 0.3s infinite;
        }

        .glitch:hover::after {
            opacity: 0.8;
            animation: glitch-b 0.3s infinite;
        }

        .glitch.beat-glitch::before {
            opacity: 0.8;
            animation: glitch-r 0.15s infinite;
        }

        .glitch.beat-glitch::after {
            opacity: 0.8;
            animation: glitch-b 0.15s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }

        @keyframes glitch-r {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(3px, -2px); }
            60% { transform: translate(-2px, -1px); }
            80% { transform: translate(2px, 1px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch-b {
            0% { transform: translate(0); }
            20% { transform: translate(3px, -2px); }
            40% { transform: translate(-3px, 2px); }
            60% { transform: translate(2px, 1px); }
            80% { transform: translate(-2px, -1px); }
            100% { transform: translate(0); }
        }

        /* Links */
        .links {
            margin-top: 25px;
        }

        .links a {
            display: inline-block;
            margin: 0 10px;
            padding: 10px 22px;
            border: 1px solid #7aa2ff;
            border-radius: 30px;
            color: #7aa2ff;
            text-decoration: none;
            transition: all 0.3s ease;
            transform-style: preserve-3d;
            perspective: 500px;
        }

        .links a:hover {
            background: #7aa2ff;
            color: #0b0b0f;
        }

        /* Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a1a24 0, #050509 60%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10000;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(122, 162, 255, 0.2);
            border-top-color: #7aa2ff;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(122, 162, 255, 0.6);
        }

        .loader-text {
            margin-top: 18px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #b5b5ff;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-fade-out {
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        /* Volume Controls */
        #volume-slider {
            width: 120px;
            cursor: pointer;
        }

        #volume-controls button {
            cursor: pointer;
            transition: 0.2s;
        }

        #volume-controls button:hover {
            background: #7aa2ff;
            color: #0b0b0f;
        }

        #prev-btn:hover, #next-btn:hover {
            background: #7aa2ff;
            color: #0b0b0f;
        }

        /* Feedback button styling */
        .feedback-btn {
            background: transparent;
            border: 1px solid #7aa2ff;
            border-radius: 5px;
            color: #7aa2ff;
            padding: 5px 10px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .feedback-btn:hover {
            background: #7aa2ff;
            color: #0b0b0f;
        }

        /* Discord Status Widget */
        .discord-widget {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            border: 1px solid rgba(122, 162, 255, 0.3);
            border-radius: 30px;
            background: rgba(122, 162, 255, 0.08);
            transition: all 0.3s ease, transform 0.15s ease;
            text-decoration: none;
            color: #cbd5ff;
            font-size: 0.85rem;
            transform-style: preserve-3d;
            perspective: 500px;
        }

        .discord-widget:hover {
            border-color: #7aa2ff;
            background: rgba(122, 162, 255, 0.15);
            box-shadow: 0 0 12px rgba(122, 162, 255, 0.2);
        }

        .discord-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #3ba55d;
            box-shadow: 0 0 8px #3ba55d;
            animation: pulse-dot 2s ease infinite;
        }

        .discord-dot.dnd {
            background: #ed4245;
            box-shadow: 0 0 8px #ed4245;
        }

        .discord-dot.idle {
            background: #faa61a;
            box-shadow: 0 0 8px #faa61a;
        }

        .discord-dot.offline {
            background: #747f8d;
            box-shadow: 0 0 8px #747f8d;
            animation: none;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.3); }
        }

        .discord-count {
            font-weight: 600;
            color: #7aa2ff;
        }

        .discord-label {
            color: #8a96b8;
        }


        /* Bottom Status Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(122, 162, 255, 0.15);
            z-index: 10;
            font-size: 0.75rem;
            color: #8a96b8;
        }

        .bar-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .bar-item .bar-num {
            font-weight: 600;
            color: #7aa2ff;
            font-variant-numeric: tabular-nums;
        }

        .bar-item .online-dot {
            color: #3ba55d;
            font-size: 0.5rem;
            animation: pulse-dot 2s ease infinite;
        }

        .bar-sep {
            width: 1px;
            height: 14px;
            background: rgba(122, 162, 255, 0.2);
        }


        /* Page Transition Overlay */
        .page-transition {
            position: fixed;
            inset: 0;
            z-index: 9998;
            pointer-events: none;
            opacity: 0;
        }

        .page-transition.active {
            pointer-events: all;
        }

        .page-transition canvas {
            width: 100%;
            height: 100%;
        }

        /* Notification Toast */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 30px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: rgba(10, 12, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(122, 162, 255, 0.25);
            border-radius: 10px;
            font-size: 0.8rem;
            color: #cbd5ff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            animation: toast-in 0.4s ease, toast-out 0.4s ease 4.6s forwards;
            white-space: nowrap;
        }

        .toast-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3ba55d;
            box-shadow: 0 0 6px #3ba55d;
            flex-shrink: 0;
        }

        .toast-text strong {
            color: #7aa2ff;
        }

        @keyframes toast-in {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes toast-out {
            from { opacity: 1; }
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Audio Waveform Visualizer */
        .nav-visualizer {
            display: flex;
            align-items: center;
            height: 28px;
            gap: 2px;
        }

        .nav-visualizer canvas {
            height: 28px;
            width: 80px;
        }

        /* Decrypt text effect */
        .decrypt-char {
            display: inline-block;
            min-width: 0.3em;
        }

        /* Sound-reactive cursor transition */
        .cursor {
            transition: width 0.08s ease, height 0.08s ease, box-shadow 0.08s ease;
        }

        /* Chat Wall */
        .chat-input-container {
            position: fixed;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 11;
            display: flex;
            gap: 8px;
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        .chat-input-container:hover,
        .chat-input-container:focus-within {
            opacity: 1;
        }

        .chat-input {
            background: rgba(10, 12, 20, 0.8);
            border: 1px solid rgba(122, 162, 255, 0.3);
            border-radius: 20px;
            padding: 6px 16px;
            color: #cbd5ff;
            font-family: inherit;
            font-size: 0.8rem;
            outline: none;
            width: 240px;
            backdrop-filter: blur(8px);
            cursor: text;
        }

        .chat-input:focus {
            border-color: #7aa2ff;
            box-shadow: 0 0 10px rgba(122, 162, 255, 0.15);
        }

        .chat-input::placeholder {
            color: #5a6480;
        }

        .chat-send {
            background: rgba(122, 162, 255, 0.15);
            border: 1px solid rgba(122, 162, 255, 0.3);
            border-radius: 20px;
            padding: 6px 14px;
            color: #7aa2ff;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-send:hover {
            background: #7aa2ff;
            color: #0b0b0f;
        }

        .chat-bubble {
            position: fixed;
            white-space: nowrap;
            font-size: 0.9rem;
            color: rgba(200, 215, 255, 0.7);
            text-shadow: 0 0 8px rgba(122, 162, 255, 0.3);
            pointer-events: none;
            z-index: 5;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Gravity hint */
        .gravity-hint {
            position: fixed;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: rgba(138, 150, 184, 0.25);
            z-index: 5;
            pointer-events: none;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="page-transition" id="page-transition">

            <a href="map.html" class="feedback-btn" style="text-decoration: none;" id="map-link">Visitor Map</a>

                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.3">

    <!-- Main Content -->
    <section id="home">
        <div class="home-content">
            <h1 class="glitch" data-text="Logan Sandivar">Logan Sandivar</h1>
            <div class="links">
                <a href="https://steamcommunity.com/id/LoganSandivar/" target="_blank">Steam</a>
                <a href="https://www.youtube.com/@LoganSandivar" target="_blank">YouTube</a>
                <a href="https://youtu.be/FGWTg4ab6y4" target="_blank">ServerLagger</a>
                <a href="https://discord.gg/BFs2Dgcg4y" target="_blank">Discord Server</a>
            </div>
        </div>

    <!-- Chat Wall Input -->
    <div class="chat-input-container">
        <input type="text" class="chat-input" id="chat-input" placeholder="Leave a message..." maxlength="100" autocomplete="off">
        <button class="chat-send" id="chat-send">Send</button>
    </div>

    <!-- Gravity Hint -->
    <div class="gravity-hint">press G for gravity</div>

    <!-- Bottom Status Bar -->
    <div class="bottom-bar">
        <div class="bar-section">
            <div class="bar-item">
                <span class="online-dot">&#9679;</span>
                <span class="bar-num" id="online-count">—</span>
                <span>online</span>
            </div>
            <div class="bar-sep"></div>

                <span class="bar-num" id="visitor-count">—</span>
                <span>visitors</span>
            </div>

            <div class="bar-item">
                <span class="bar-num" id="click-count">—</span>
                <span>clicks</span>
            </div>
        </div>
        <div class="bar-section">
            <div class="bar-item">
                <span>uptime</span>
                <span class="bar-num" id="uptime-display">—</span>
            </div>
        </div>
    </div>

    <!-- Background Music -->
    <audio id="bg-music" loop>
        <source src="bg-music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ==============================================
        // VISITOR COUNTER + ONLINE TRACKING
        // ==============================================
        const visitorId = localStorage.getItem('vid') || Math.random().toString(36).slice(2, 10);
        localStorage.setItem('vid', visitorId);

        let visitorLocations = [];

        async function counterFetch(action) {
            try {
                const res = await fetch(`counter.php?action=${action}&id=${visitorId}`);
                const data = await res.json();
                document.getElementById('visitor-count').textContent = data.count.toLocaleString();
                document.getElementById('online-count').textContent = data.online;
                document.getElementById('click-count').textContent = data.clicks.toLocaleString();
                if (data.locations) {
                    visitorLocations = data.locations;
                    drawVisitorMap();
                }
            } catch (e) {}
        }

        // Initial visit (increments total)
        counterFetch('visit');

        // Heartbeat every 30 seconds
        setInterval(() => counterFetch('heartbeat'), 30000);

        // Click counter — track all clicks on the page
        document.addEventListener('click', () => {
            counterFetch('click');
        });


        // ==============================================
        // DISCORD WIDGET STATUS
        // ==============================================
        const DISCORD_GUILD_ID = "1460950529734607060";

        async function updateDiscordStatus() {
            try {
                const res = await fetch(`https://discord.com/api/guilds/${DISCORD_GUILD_ID}/widget.json`);
                const data = await res.json();

                const countEl = document.getElementById('discord-count');
                const dotEl = document.getElementById('discord-dot');

                countEl.textContent = data.presence_count;

                // Find the owner/first member to show their status color
                if (data.members && data.members.length > 0) {
                    const owner = data.members[0];
                    dotEl.className = 'discord-dot';
                    if (owner.status === 'dnd') dotEl.classList.add('dnd');
                    else if (owner.status === 'idle') dotEl.classList.add('idle');
                    else if (owner.status === 'offline') dotEl.classList.add('offline');
                    // default green for 'online'
                }

                if (data.presence_count === 0) {
                    dotEl.className = 'discord-dot offline';
                }
            } catch (e) {
                console.warn('Discord widget fetch failed:', e);
            }
        }

        // Fetch immediately, then every 30 seconds
        updateDiscordStatus();
        setInterval(updateDiscordStatus, 30000);

        // ==============================================
        // DISCORD WEBHOOK NOTIFICATION (IP + BROWSER INFO)
        // ==============================================
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1380491521505103954/JKTPV_VbegMcNDMzMRzWutVKWK497e14sOc9i-QQCVldygd0HqBSEBRmTFi73dE-gRUa";

        async function sendVisitorInfo() {
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const visitorIP = ipData.ip;
                const userAgent = navigator.userAgent;
                const platform = navigator.platform || 'unknown';
                const language = navigator.language || 'unknown';
                const screenRes = `${screen.width}x${screen.height}`;
                const clientInfo = `**Visitor Info**\nIP: ${visitorIP}\nPlatform: ${platform}\nLanguage: ${language}\nScreen: ${screenRes}\nUser Agent: ${userAgent}`;

                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: clientInfo,
                        username: 'Site Logger'
                    })
                });
            } catch (err) {
                console.warn('Failed to send Discord notification:', err);
            }
        }

        // ==============================================
        // LOADER
        // ==============================================
        const loader = document.getElementById('loader');
        window.addEventListener('load', () => {
            setTimeout(() => {
                loader.classList.add('loader-fade-out');
                document.body.classList.add('loaded');
                setTimeout(() => loader.style.display = 'none', 900);
                // Start decrypt effect after loader fades
                setTimeout(decryptName, 600);
            }, 1200);
            setTimeout(sendVisitorInfo, 2000);
        });

        // ==============================================
        // CURSOR
        // ==============================================
        const cursor = document.querySelector('.cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.top = e.clientY + 'px';
            cursor.style.left = e.clientX + 'px';
        });

        // ==============================================
        // MUSIC & BEAT DETECTION
        // ==============================================
        const audio = document.getElementById("bg-music");
        let audioCtx, analyser, dataArray;

        function initAudioAnalyzer() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(audio);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
        }

        const volumeSlider = document.getElementById('volume-slider');
        const muteBtn = document.getElementById('mute-btn');
        let isMuted = false;

        volumeSlider.addEventListener('input', () => {
            audio.volume = volumeSlider.value;

                const prevZ = s.z + speed;
                const px = (s.x / prevZ) * 500 + cx;
                const py = (s.y / prevZ) * 500 + cy;

        function separateParticles() {
            const minDist = 140;

            for (let i = 0; i < textParticles.length; i++) {
                for (let j = i + 1; j < textParticles.length; j++) {
                    const a = textParticles[i];
                    const b = textParticles[j];
                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < minDist) {
                        const push = (minDist - dist) * force;
                        const nx = dx / (dist || 1);
                        const ny = dy / (dist || 1);
                        a.x -= nx * push;
                        a.y -= ny * push;
                        b.x += nx * push;
                        b.y += ny * push;

        setInterval(spawnTrail, 30);

        // ==============================================
        // LIGHTNING ARCS ON BEAT DROPS
        // ==============================================
        const lightningBolts = [];
        let lastLightning = 0;

        function createLightning(x1, y1, x2, y2, depth) {
            const points = [{ x: x1, y: y1 }];
            const segments = 8 + Math.floor(Math.random() * 6);
            const dx = (x2 - x1) / segments;
            const dy = (y2 - y1) / segments;
            const jitter = Math.hypot(x2 - x1, y2 - y1) * 0.15;

            for (let i = 1; i < segments; i++) {
                points.push({
                    x: x1 + dx * i + (Math.random() - 0.5) * jitter,
                    y: y1 + dy * i + (Math.random() - 0.5) * jitter
                });
            }
            points.push({ x: x2, y: y2 });

            lightningBolts.push({
                points,
                alpha: 1,
                width: depth === 0 ? 3 : 1.5,
                hue: 210 + Math.random() * 40
            });

            // Branch
            if (depth < 2 && Math.random() < 0.4) {
                const branchIdx = Math.floor(Math.random() * points.length * 0.6) + 2;
                if (branchIdx < points.length) {
                    const bp = points[branchIdx];
                    const bx = bp.x + (Math.random() - 0.5) * 200;
                    const by = bp.y + (Math.random() - 0.5) * 200;
                    createLightning(bp.x, bp.y, bx, by, depth + 1);
                }
            }
        }

        function checkLightning() {
            const beat = getBeatStrength();
            const now = Date.now();
            if (beat > 70 && now - lastLightning > 400) {
                lastLightning = now;
                // Random start/end points across screen
                const x1 = Math.random() * w;
                const y1 = Math.random() * h * 0.3;
                const x2 = x1 + (Math.random() - 0.5) * w * 0.6;
                const y2 = y1 + h * 0.3 + Math.random() * h * 0.4;
                createLightning(x1, y1, x2, y2, 0);

                // Sometimes spawn a second bolt
                if (beat > 90 && Math.random() < 0.5) {
                    createLightning(Math.random() * w, 0, Math.random() * w, h * 0.7, 0);
                }
            }
        }

        function updateLightning() {
            for (let i = lightningBolts.length - 1; i >= 0; i--) {
                lightningBolts[i].alpha -= 0.04;
                if (lightningBolts[i].alpha <= 0) {
                    lightningBolts.splice(i, 1);
                }
            }
        }

        function drawLightning() {
            lightningBolts.forEach(bolt => {
                ctx.save();
                ctx.globalAlpha = bolt.alpha;
                ctx.strokeStyle = `hsla(${bolt.hue}, 90%, 80%, 1)`;
                ctx.shadowColor = `hsla(${bolt.hue}, 100%, 70%, 1)`;
                ctx.shadowBlur = 20;
                ctx.lineWidth = bolt.width;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(bolt.points[0].x, bolt.points[0].y);
                for (let i = 1; i < bolt.points.length; i++) {
                    ctx.lineTo(bolt.points[i].x, bolt.points[i].y);
                }
                ctx.stroke();
                // Bright core
                ctx.strokeStyle = `hsla(${bolt.hue}, 60%, 95%, ${bolt.alpha})`;
                ctx.lineWidth = bolt.width * 0.4;
                ctx.shadowBlur = 0;
                ctx.stroke();
                ctx.restore();
            });
        }

        // ==============================================
        // IDLE ANIMATION (10s no mouse movement)
        // ==============================================
        let lastMouseMove = Date.now();
        let idleActive = false;
        let idleAngle = 0;

        document.addEventListener('mousemove', () => {
            lastMouseMove = Date.now();
            if (idleActive) {
                idleActive = false;
            }
        });

        function checkIdle() {
            if (Date.now() - lastMouseMove > 10000 && !idleActive) {
                idleActive = true;
            }
        }

        function updateIdle() {
            if (!idleActive) return;
            idleAngle += 0.015;

            // Swirl all text particles toward center in a spiral
            const cx = w / 2;
            const cy = h / 2;
            textParticles.forEach((t, i) => {
                if (t.exploding) return;
                const targetX = cx + Math.cos(idleAngle + i * 1.5) * (100 + i * 30);
                const targetY = cy + Math.sin(idleAngle + i * 1.5) * (60 + i * 20);
                t.vx += (targetX - t.x) * 0.008;
                t.vy += (targetY - t.y) * 0.008;
            });

            // Swirl shape particles into a vortex
            shapeParticles.forEach((sp, i) => {
                const angle = idleAngle + (i / shapeParticles.length) * Math.PI * 2;
                const radius = 80 + (i / shapeParticles.length) * 250;
                const idleTargetX = cx + Math.cos(angle) * radius;
                const idleTargetY = cy + Math.sin(angle) * radius;
                sp.tx = sp.tx * 0.95 + idleTargetX * 0.05;
                sp.ty = sp.ty * 0.95 + idleTargetY * 0.05;
            });
        }

        // Inject new systems into the draw loop
        const originalDraw = draw;
        draw = function() {
            ctx.clearRect(0, 0, w, h);
            const beat = getBeatStrength();
            const beatScale = 1 + beat / 150;
            hueBase = (hueBase + 0.2 + beat / 50) % 360;

            // Idle check
            checkIdle();
            updateIdle();

            // Shape particles
            shapeParticles.forEach(sp => {
                const dx = sp.tx - sp.x;
                const dy = sp.ty - sp.y;
                sp.vx += dx * 0.04;
                sp.vy += dy * 0.04;
                sp.vx *= 0.85;
                sp.vy *= 0.85;
                sp.x += sp.vx;
                sp.y += sp.vy;
                ctx.fillStyle = `hsla(${(hueBase + 20) % 360}, 80%, 75%, ${0.8 + beat / 400})`;
                ctx.beginPath();
                ctx.arc(sp.x, sp.y, 2.4 * beatScale, 0, Math.PI * 2);
                ctx.fill();
            });

            updateFloatingText(beat);
            drawFloatingText(beat);

            // 3D Word cloud
            drawWordCloud(beat);

            // Cursor trail
            updateTrail();
            drawTrail();

            // Lightning
            checkLightning();
            updateLightning();
            drawLightning();

            frameCount++;
            if (frameCount % TAGLINE_DURATION_FRAMES === 0) {
                currentTaglineIndex = (currentTaglineIndex + 1) % taglines.length;
                if (!idleActive) {
                    createShapeForTagline(taglines[currentTaglineIndex]);
                }
            }

            requestAnimationFrame(draw);
        };

        draw();

        // ==============================================
        // PAGE TRANSITION (WARP EFFECT)
        // ==============================================
        const transOverlay = document.getElementById('page-transition');
        const transCanvas = document.getElementById('transition-canvas');
        const transCtx = transCanvas.getContext('2d');

        function playTransition(targetUrl) {
            transCanvas.width = window.innerWidth;
            transCanvas.height = window.innerHeight;
            transOverlay.classList.add('active');
            transOverlay.style.opacity = '1';

            const stars = [];
            const cx = transCanvas.width / 2;
            const cy = transCanvas.height / 2;

            for (let i = 0; i < 300; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * 2000,
                    y: (Math.random() - 0.5) * 2000,
                    z: Math.random() * 1500
                });
            }

            let speed = 5;
            let frame = 0;
            const maxFrames = 60;

            function animateTransition() {
                transCtx.fillStyle = `rgba(11, 11, 15, ${frame < 40 ? 0.3 : 0.5})`;
                transCtx.fillRect(0, 0, transCanvas.width, transCanvas.height);

                speed = 5 + (frame / maxFrames) * 80;

                for (const s of stars) {
                    s.z -= speed;
                    if (s.z <= 0) {
                        s.x = (Math.random() - 0.5) * 2000;
                        s.y = (Math.random() - 0.5) * 2000;
                        s.z = 1500;
                    }

                    const sx = (s.x / s.z) * 500 + cx;
                    const sy = (s.y / s.z) * 500 + cy;
                    const prevZ = s.z + speed;
                    const px = (s.x / prevZ) * 500 + cx;
                    const py = (s.y / prevZ) * 500 + cy;
                    const alpha = 1 - s.z / 1500;
                    const size = Math.max(0.5, (1 - s.z / 1500) * 3);

                    transCtx.strokeStyle = `rgba(122, 162, 255, ${alpha})`;
                    transCtx.lineWidth = size;
                    transCtx.beginPath();
                    transCtx.moveTo(px, py);
                    transCtx.lineTo(sx, sy);
                    transCtx.stroke();
                }

                // White flash at the end
                if (frame > maxFrames - 15) {
                    const flashAlpha = (frame - (maxFrames - 15)) / 15;
                    transCtx.fillStyle = `rgba(122, 162, 255, ${flashAlpha * 0.3})`;
                    transCtx.fillRect(0, 0, transCanvas.width, transCanvas.height);
                }

                frame++;
                if (frame < maxFrames) {
                    requestAnimationFrame(animateTransition);
                } else {
                    window.location.href = targetUrl;
                }
            }

            animateTransition();
        }

        // Intercept map link
        const mapLink = document.getElementById('map-link');
        if (mapLink) {
            mapLink.addEventListener('click', (e) => {
                e.preventDefault();
                playTransition(mapLink.href);
            });
        }

        // ==============================================
        // NOTIFICATION TOASTS (NEW VISITOR)
        // ==============================================
        const toastContainer = document.getElementById('toast-container');
        let lastVisitorCount = 0;
        let toastInitialized = false;

        function showToast(city, country) {
            const toast = document.createElement('div');
            toast.className = 'toast';

            const location = city && country ? `${city}, ${country}` : country || 'somewhere';
            toast.innerHTML = `
                <div class="toast-dot"></div>
                <div class="toast-text">Someone from <strong>${location}</strong> just visited</div>
            `;

            toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        // Poll for new visitors
        async function checkNewVisitors() {
            try {
                const res = await fetch('counter.php?action=heartbeat&id=' + visitorId);
                const data = await res.json();

                if (!toastInitialized) {
                    lastVisitorCount = data.count;
                    toastInitialized = true;
                    return;
                }

                if (data.count > lastVisitorCount && data.locations && data.locations.length > 0) {
                    const newest = data.locations[data.locations.length - 1];
                    showToast(newest.city, newest.country);
                    lastVisitorCount = data.count;
                }
            } catch (e) {}
        }

        checkNewVisitors();
        setInterval(checkNewVisitors, 15000);

        // ==============================================
        // SOUND-REACTIVE CURSOR SIZE
        // ==============================================
        function updateCursorSize() {
            const beat = getBeatStrength();
            const baseSize = 18;
            const extra = (beat / 255) * 34;
            const size = baseSize + extra;
            cursor.style.width = size + 'px';
            cursor.style.height = size + 'px';

            const glowSpread = 20 + (beat / 255) * 40;
            const glowAlpha = 0.6 + (beat / 255) * 0.4;
            cursor.style.boxShadow = `0 0 ${glowSpread}px rgba(122, 162, 255, ${glowAlpha})`;

            requestAnimationFrame(updateCursorSize);
        }
        updateCursorSize();

        // ==============================================
        // GRAVITY MODE (press G)
        // ==============================================
        let gravityActive = false;

        document.addEventListener('keydown', (e) => {
            if ((e.key === 'g' || e.key === 'G') && !gravityActive && document.activeElement.tagName !== 'INPUT') {
                activateGravity();
            }
        });

        function activateGravity() {
            gravityActive = true;

            const selectors = [
                '.home-content h1',
                '.links a',
                '.discord-widget',
                '#feedbackButton',
                '#volume-controls',
                'nav strong',
                '.nav-visualizer',
                '.bar-item',
                '#map-link',
                '.bar-sep'
            ];

            const gEls = [];
            selectors.forEach(sel => {
                document.querySelectorAll(sel).forEach(el => {
                    const rect = el.getBoundingClientRect();
                    const floor = window.innerHeight - rect.bottom;
                    gEls.push({
                        el,
                        y: 0,
                        vy: Math.random() * -3,
                        rotation: 0,
                        rotSpeed: (Math.random() - 0.5) * 8,
                        floor: Math.max(10, floor - 5 - Math.random() * 20),
                        origTransition: el.style.transition,
                        origTransform: el.style.transform
                    });
                    el.style.transition = 'none';
                });
            });

            const gravity = 0.65;
            const bounce = 0.35;
            const friction = 0.98;
            let settled = 0;

            function gravityFrame() {
                settled = 0;
                gEls.forEach(ge => {
                    ge.vy += gravity;
                    ge.y += ge.vy;
                    ge.rotation += ge.rotSpeed;

                    if (ge.y >= ge.floor) {
                        ge.y = ge.floor;
                        ge.vy *= -bounce;
                        ge.rotSpeed *= 0.6;
                        if (Math.abs(ge.vy) < 0.8) {
                            ge.vy = 0;
                            settled++;
                        }
                    }

                    ge.rotSpeed *= friction;
                    ge.el.style.transform = `translateY(${ge.y}px) rotate(${ge.rotation}deg)`;
                });

                if (settled < gEls.length) {
                    requestAnimationFrame(gravityFrame);
                } else {
                    setTimeout(() => reassemble(gEls), 1500);
                }
            }

            requestAnimationFrame(gravityFrame);
        }

        function reassemble(gEls) {
            gEls.forEach(ge => {
                ge.el.style.transition = 'transform 0.9s cubic-bezier(0.2, 0.8, 0.2, 1.15)';
                ge.el.style.transform = ge.origTransform || '';
            });

            setTimeout(() => {
                gEls.forEach(ge => {
                    ge.el.style.transition = ge.origTransition || '';
                });
                gravityActive = false;
            }, 1000);
        }

        // ==============================================
        // VISITOR CHAT WALL (DANMAKU)
        // ==============================================
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send');
        const seenChatIds = new Set();

        function spawnChatBubble(text) {
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            bubble.textContent = text;

            // Random vertical position (avoid top nav and bottom bar)
            const yMin = 80;
            const yMax = window.innerHeight - 80;
            const y = yMin + Math.random() * (yMax - yMin);
            bubble.style.top = y + 'px';
            bubble.style.left = window.innerWidth + 'px';

            // Random speed (8-15 seconds to cross)
            const duration = 8000 + Math.random() * 7000;
            const hue = 200 + Math.random() * 60;
            const alpha = 0.5 + Math.random() * 0.3;
            bubble.style.color = `hsla(${hue}, 60%, 80%, ${alpha})`;
            bubble.style.fontSize = (0.8 + Math.random() * 0.4) + 'rem';

            document.body.appendChild(bubble);

            const startX = window.innerWidth + 20;
            const endX = -bubble.offsetWidth - 20;
            const startTime = performance.now();

            function animateBubble(now) {
                const elapsed = now - startTime;
                const progress = elapsed / duration;

                if (progress >= 1) {
                    bubble.remove();
                    return;
                }

                const x = startX + (endX - startX) * progress;
                // Slight wave
                const wave = Math.sin(progress * Math.PI * 2 + y) * 8;
                bubble.style.transform = `translateX(${x - startX}px) translateY(${wave}px)`;
                bubble.style.left = startX + 'px';
                bubble.style.opacity = progress < 0.1 ? progress * 10 : progress > 0.85 ? (1 - progress) / 0.15 : 1;

                requestAnimationFrame(animateBubble);
            }

            requestAnimationFrame(animateBubble);
        }

        async function sendChatMessage() {
            const msg = chatInput.value.trim();
            if (!msg) return;
            chatInput.value = '';

            // Immediately show locally
            spawnChatBubble(msg);

            try {
                await fetch('chat.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
            } catch (e) {}
        }

        chatSendBtn.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendChatMessage();
            e.stopPropagation(); // Prevent G key triggering gravity while typing
        });

        // Load existing messages and spawn them gradually
        async function loadChatMessages() {
            try {
                const res = await fetch('chat.php');
                const messages = await res.json();

                messages.forEach(m => {
                    if (!seenChatIds.has(m.id)) {
                        seenChatIds.add(m.id);
                    }
                });

                // Spawn recent messages with staggered delays
                let delay = 0;
                const recent = messages.slice(-10);
                recent.forEach(m => {
                    setTimeout(() => spawnChatBubble(m.text), delay);
                    delay += 2000 + Math.random() * 3000;
                });
            } catch (e) {}
        }

        loadChatMessages();

        // Poll for new messages every 20 seconds
        setInterval(async () => {
            try {
                const res = await fetch('chat.php');
                const messages = await res.json();
                messages.forEach(m => {
                    if (!seenChatIds.has(m.id)) {
                        seenChatIds.add(m.id);
                        spawnChatBubble(m.text);
                    }
                });
            } catch (e) {}
        }, 20000);
    </script>
