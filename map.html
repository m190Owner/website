<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visitor Map | Logan Sandivar</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="theme-color" content="#7aa2ff" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0b0f;
            color: #e5e5e5;
            overflow: hidden;
            height: 100vh;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 10;
            border-bottom: 1px solid rgba(122, 162, 255, 0.15);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-left strong {
            color: #e5e5e5;
        }

        .nav-link {
            color: #7aa2ff;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 5px 14px;
            border: 1px solid #7aa2ff;
            border-radius: 5px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: #7aa2ff;
            color: #0b0b0f;
        }

        .map-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #visitor-map-canvas {
            width: 100%;
            height: 100%;
        }

        .map-title {
            position: fixed;
            top: 80px;
            left: 40px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #cbd5ff;
            letter-spacing: 1px;
            z-index: 5;
        }

        .map-subtitle {
            position: fixed;
            top: 110px;
            left: 40px;
            font-size: 0.8rem;
            color: #6b7aa0;
            z-index: 5;
        }

        .map-stats {
            position: fixed;
            top: 80px;
            right: 40px;
            display: flex;
            gap: 24px;
            font-size: 0.8rem;
            color: #8a96b8;
            z-index: 5;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .stat-num {
            font-size: 1.5rem;
            font-weight: 700;
            color: #7aa2ff;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(122, 162, 255, 0.15);
            z-index: 10;
            font-size: 0.75rem;
            color: #6b7aa0;
            gap: 30px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #7aa2ff;
            box-shadow: 0 0 6px #7aa2ff;
        }

        .legend-dot.recent {
            animation: pulse-legend 2s ease infinite;
        }

        .legend-dot.old {
            opacity: 0.3;
        }

        @keyframes pulse-legend {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }

        .map-tooltip {
            position: fixed;
            padding: 6px 12px;
            background: rgba(15, 15, 25, 0.9);
            border: 1px solid rgba(122, 162, 255, 0.3);
            border-radius: 6px;
            font-size: 0.75rem;
            color: #cbd5ff;
            pointer-events: none;
            z-index: 20;
            display: none;
            backdrop-filter: blur(4px);
        }

        .loading-map {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #7aa2ff;
            font-size: 0.9rem;
            letter-spacing: 2px;
            z-index: 5;
        }

        .page-transition {
            position: fixed;
            inset: 0;
            z-index: 9998;
            pointer-events: none;
            opacity: 0;
        }

        .page-transition.active {
            pointer-events: all;
            opacity: 1;
        }

        .page-transition canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="page-transition" id="page-transition">
        <canvas id="transition-canvas"></canvas>
    </div>

    <nav>
        <div class="nav-left">
            <strong>Logan Sandivar</strong>
            <a href="index.html" class="nav-link" id="home-link">Home</a>
        </div>
    </nav>

    <div class="map-title">Visitor Map</div>
    <div class="map-subtitle">Showing locations of recent visitors</div>

    <div class="map-stats">
        <div class="stat">
            <span class="stat-num" id="total-visitors">—</span>
            <span>total visitors</span>
        </div>
        <div class="stat">
            <span class="stat-num" id="unique-locations">—</span>
            <span>locations</span>
        </div>
    </div>

    <div class="map-container">
        <canvas id="visitor-map-canvas"></canvas>
    </div>

    <div class="loading-map" id="loading">loading world data...</div>
    <div class="map-tooltip" id="tooltip"></div>

    <div class="bottom-bar">
        <div class="legend-item">
            <div class="legend-dot recent"></div>
            <span>recent visitor</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot"></div>
            <span>visitor</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot old"></div>
            <span>older visit</span>
        </div>
    </div>

    <script>
        const mapCanvas = document.getElementById('visitor-map-canvas');
        const mapCtx = mapCanvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const loadingEl = document.getElementById('loading');
        let visitorLocations = [];
        let worldPolygons = [];

        function resizeMap() {
            const container = document.querySelector('.map-container');
            mapCanvas.width = container.clientWidth;
            mapCanvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resizeMap);
        resizeMap();

        // ==========================================
        // TOPOJSON DECODER (minimal)
        // ==========================================
        function decodeArc(topology, arcIdx) {
            const arc = topology.arcs[arcIdx < 0 ? ~arcIdx : arcIdx];
            const coords = [];
            let x = 0, y = 0;
            for (const [dx, dy] of arc) {
                x += dx;
                y += dy;
                const lon = x * topology.transform.scale[0] + topology.transform.translate[0];
                const lat = y * topology.transform.scale[1] + topology.transform.translate[1];
                coords.push([lon, lat]);
            }
            if (arcIdx < 0) coords.reverse();
            return coords;
        }

        function decodeRing(topology, indices) {
            let coords = [];
            for (const idx of indices) {
                const arc = decodeArc(topology, idx);
                coords = coords.concat(arc);
            }
            return coords;
        }

        function topoToPolygons(topology, objectName) {
            const obj = topology.objects[objectName];
            const polygons = [];

            function processGeometry(geom) {
                if (geom.type === 'Polygon') {
                    for (const ring of geom.arcs) {
                        polygons.push(decodeRing(topology, ring));
                    }
                } else if (geom.type === 'MultiPolygon') {
                    for (const polygon of geom.arcs) {
                        for (const ring of polygon) {
                            polygons.push(decodeRing(topology, ring));
                        }
                    }
                } else if (geom.type === 'GeometryCollection') {
                    for (const g of geom.geometries) {
                        processGeometry(g);
                    }
                }
            }

            processGeometry(obj);
            return polygons;
        }

        // ==========================================
        // LOAD WORLD DATA
        // ==========================================
        async function loadWorld() {
            try {
                const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json');
                const topo = await res.json();
                worldPolygons = topoToPolygons(topo, 'land');
                loadingEl.style.display = 'none';
            } catch (e) {
                loadingEl.textContent = 'failed to load map data';
                console.error(e);
            }
        }
        loadWorld();

        // ==========================================
        // FETCH VISITOR DATA
        // ==========================================
        async function fetchData() {
            try {
                const res = await fetch('counter.php?action=heartbeat&id=mapview');
                const data = await res.json();
                visitorLocations = data.locations || [];
                document.getElementById('total-visitors').textContent = data.count;
                document.getElementById('unique-locations').textContent = visitorLocations.length;
            } catch (e) {}
        }
        fetchData();
        setInterval(fetchData, 30000);

        // ==========================================
        // MERCATOR PROJECTION
        // ==========================================
        function latLonToXY(lat, lon, cw, ch) {
            const x = ((lon + 180) / 360) * cw;
            const latRad = (lat * Math.PI) / 180;
            const mercN = Math.log(Math.tan(Math.PI / 4 + latRad / 2));
            const y = (ch / 2) - (cw * mercN) / (2 * Math.PI);
            return { x, y };
        }

        // ==========================================
        // TOOLTIP
        // ==========================================
        let dotPositions = [];

        mapCanvas.addEventListener('mousemove', (e) => {
            const rect = mapCanvas.getBoundingClientRect();
            const scaleX = mapCanvas.width / rect.width;
            const scaleY = mapCanvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;

            let found = null;
            for (const dp of dotPositions) {
                const dist = Math.hypot(dp.x - mx, dp.y - my);
                if (dist < 12) {
                    found = dp;
                    break;
                }
            }

            if (found) {
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 12) + 'px';
                tooltip.style.top = (e.clientY - 10) + 'px';
                const date = new Date(found.time * 1000);
                tooltip.textContent = `${found.city}, ${found.country} — ${date.toLocaleDateString()}`;
            } else {
                tooltip.style.display = 'none';
            }
        });

        // ==========================================
        // DRAW MAP
        // ==========================================
        function drawVisitorMap() {
            const cw = mapCanvas.width;
            const ch = mapCanvas.height;
            mapCtx.clearRect(0, 0, cw, ch);
            dotPositions = [];

            // Grid lines
            mapCtx.strokeStyle = 'rgba(122, 162, 255, 0.04)';
            mapCtx.lineWidth = 1;
            for (let lat = -60; lat <= 80; lat += 20) {
                const { y } = latLonToXY(lat, 0, cw, ch);
                mapCtx.beginPath();
                mapCtx.moveTo(0, y);
                mapCtx.lineTo(cw, y);
                mapCtx.stroke();
            }
            for (let lon = -180; lon <= 180; lon += 30) {
                const { x } = latLonToXY(0, lon, cw, ch);
                mapCtx.beginPath();
                mapCtx.moveTo(x, 0);
                mapCtx.lineTo(x, ch);
                mapCtx.stroke();
            }

            // Draw world polygons
            worldPolygons.forEach(polygon => {
                mapCtx.beginPath();
                polygon.forEach((coord, i) => {
                    const { x, y } = latLonToXY(coord[1], coord[0], cw, ch);
                    if (i === 0) mapCtx.moveTo(x, y);
                    else mapCtx.lineTo(x, y);
                });
                mapCtx.closePath();
                mapCtx.fillStyle = 'rgba(122, 162, 255, 0.07)';
                mapCtx.fill();
                mapCtx.strokeStyle = 'rgba(122, 162, 255, 0.18)';
                mapCtx.lineWidth = 0.8;
                mapCtx.stroke();
            });

            // Visitor dots
            visitorLocations.forEach((loc) => {
                const { x, y } = latLonToXY(loc.lat, loc.lon, cw, ch);
                const age = (Date.now() / 1000 - loc.time) / 86400;
                const alpha = Math.max(0.2, 1 - age * 0.03);

                // Outer glow
                mapCtx.beginPath();
                mapCtx.arc(x, y, 12, 0, Math.PI * 2);
                mapCtx.fillStyle = `rgba(122, 162, 255, ${alpha * 0.06})`;
                mapCtx.fill();

                // Mid glow
                mapCtx.beginPath();
                mapCtx.arc(x, y, 6, 0, Math.PI * 2);
                mapCtx.fillStyle = `rgba(122, 162, 255, ${alpha * 0.12})`;
                mapCtx.fill();

                // Core dot
                mapCtx.beginPath();
                mapCtx.arc(x, y, 3, 0, Math.PI * 2);
                mapCtx.fillStyle = `rgba(122, 162, 255, ${alpha})`;
                mapCtx.shadowColor = '#7aa2ff';
                mapCtx.shadowBlur = 8;
                mapCtx.fill();
                mapCtx.shadowBlur = 0;

                dotPositions.push({ x, y, city: loc.city, country: loc.country, time: loc.time });
            });

            // Pulse on newest
            if (visitorLocations.length > 0) {
                const newest = visitorLocations[visitorLocations.length - 1];
                const { x, y } = latLonToXY(newest.lat, newest.lon, cw, ch);
                const pulse = (Date.now() % 2000) / 2000;

                mapCtx.beginPath();
                mapCtx.arc(x, y, 4 + pulse * 18, 0, Math.PI * 2);
                mapCtx.strokeStyle = `rgba(122, 162, 255, ${0.5 - pulse * 0.5})`;
                mapCtx.lineWidth = 2;
                mapCtx.stroke();
            }
        }

        setInterval(drawVisitorMap, 80);

        // Page transition
        const transOverlay = document.getElementById('page-transition');
        const transCanvas = document.getElementById('transition-canvas');
        const transCtx = transCanvas.getContext('2d');

        function playTransition(targetUrl) {
            transCanvas.width = window.innerWidth;
            transCanvas.height = window.innerHeight;
            transOverlay.classList.add('active');

            const tStars = [];
            const cx = transCanvas.width / 2;
            const cy = transCanvas.height / 2;

            for (let i = 0; i < 300; i++) {
                tStars.push({
                    x: (Math.random() - 0.5) * 2000,
                    y: (Math.random() - 0.5) * 2000,
                    z: Math.random() * 1500
                });
            }

            let speed = 5;
            let frame = 0;
            const maxFrames = 60;

            function animate() {
                transCtx.fillStyle = `rgba(11, 11, 15, ${frame < 40 ? 0.3 : 0.5})`;
                transCtx.fillRect(0, 0, transCanvas.width, transCanvas.height);
                speed = 5 + (frame / maxFrames) * 80;

                for (const s of tStars) {
                    s.z -= speed;
                    if (s.z <= 0) { s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; s.z = 1500; }
                    const sx = (s.x / s.z) * 500 + cx;
                    const sy = (s.y / s.z) * 500 + cy;
                    const prevZ = s.z + speed;
                    const px = (s.x / prevZ) * 500 + cx;
                    const py = (s.y / prevZ) * 500 + cy;
                    const alpha = 1 - s.z / 1500;
                    transCtx.strokeStyle = `rgba(122, 162, 255, ${alpha})`;
                    transCtx.lineWidth = Math.max(0.5, (1 - s.z / 1500) * 3);
                    transCtx.beginPath();
                    transCtx.moveTo(px, py);
                    transCtx.lineTo(sx, sy);
                    transCtx.stroke();
                }

                if (frame > maxFrames - 15) {
                    const f = (frame - (maxFrames - 15)) / 15;
                    transCtx.fillStyle = `rgba(122, 162, 255, ${f * 0.3})`;
                    transCtx.fillRect(0, 0, transCanvas.width, transCanvas.height);
                }

                frame++;
                if (frame < maxFrames) requestAnimationFrame(animate);
                else window.location.href = targetUrl;
            }
            animate();
        }

        const homeLink = document.getElementById('home-link');
        if (homeLink) {
            homeLink.addEventListener('click', (e) => {
                e.preventDefault();
                playTransition(homeLink.href);
            });
        }
    </script>
</body>
</html>
